name: Bug report
description: Something is broken or behaves unexpectedly
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible — vague reports are hard to fix.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Open the app
        2. Tap on …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (data loss / medication missed / cannot use the app)
        - High (major feature broken)
        - Medium (workaround exists)
        - Low (cosmetic / minor)
    validations:
      required: true

  - type: input
    id: ios_version
    attributes:
      label: iOS version
      placeholder: e.g. 18.4
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. iPhone 15 Pro
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version / build
      placeholder: e.g. 0.2.1 (build 42)
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Is this a regression?
      options:
        - "No / unsure"
        - "Yes — previous version worked"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Attach screenshots or paste relevant log output.
      render: shell

  - type: checkboxes
    id: qa_question
    attributes:
      label: QA coverage
      description: Help us close the QA gap that let this bug ship.
      options:
        - label: I checked QA_MANUAL.md and this bug is not covered by any [T-XXX] section.
        - label: I am willing to draft a [T-XXX] case for the fix PR.
