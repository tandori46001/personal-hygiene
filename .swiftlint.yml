# SwiftLint configuration
# https://realm.github.io/SwiftLint/

# Paths
included:
  - App
  - Tests

excluded:
  - Pods
  - .build
  - DerivedData
  - "**/*.generated.swift"

# Rules
disabled_rules:
  - todo                          # TODOs are useful during development
  - trailing_comma                # we accept trailing commas in multi-line collections

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Customizations
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  # Round 33: raised warning 500 → 600 to accommodate SwiftUI feature views
  # (TodayView, BackupService) without forcing cross-file extraction with
  # `@State private` access-modifier demotions. Error stays at 800 — the
  # hard ceiling that genuinely flags a file needing decomposition.
  warning: 600
  error: 800

type_body_length:
  warning: 300
  error: 500

function_body_length:
  # Round 33: raised warning 50 → 80 because SwiftUI `@ViewBuilder`
  # functions naturally compose 10+ child views with modifiers + closures,
  # routinely pushing past 50 lines without genuine complexity. Error
  # stays at 100 — the hard ceiling.
  warning: 80
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - to
    - on

custom_rules:
  hardcoded_text_view:
    name: "Hardcoded Text view"
    regex: 'Text\("[^"]+"\s*\)'
    message: "Use Localizable.xcstrings (Text(\"key\", bundle: .main)) or Text(verbatim:) for non-localizable literals."
    severity: error
    excluded:
      - "App/PersonalHygiene/App/PersonalHygieneApp.swift"
      - "Tests"
  hardcoded_navigation_title:
    name: "Hardcoded navigationTitle"
    regex: '\.navigationTitle\("[^"]+"\)'
    message: "navigationTitle should take a Text view from Localizable.xcstrings, not a string literal."
    severity: error
    excluded:
      - "Tests"
  hardcoded_accessibility_label:
    name: "Hardcoded accessibilityLabel"
    regex: '\.accessibilityLabel\("[^"]+"\)'
    message: "accessibilityLabel should pass a localized Text view, not a string literal."
    severity: error
    excluded:
      - "Tests"
  hardcoded_button_label:
    name: "Hardcoded Button label"
    regex: 'Button\("[^"]+"\s*[\),]'
    message: "Button should be built with a Text(\"key\", bundle: .main) label, not a string literal."
    severity: error
    excluded:
      - "Tests"
  dynamic_localized_key:
    name: "Dynamic LocalizedStringKey lookup (L006)"
    regex: 'LocalizedStringKey\("[^"]*\\\([^"]*"\)'
    message: "Use Text(localizedKey: \"prefix.\\(rawValue)\") for dynamic suffix lookups — LocalizedStringKey treats \\(...) as a %@ placeholder and renders the raw key (L006). For genuine format strings with %@/%lld, use LocalizedStringResource."
    severity: error
    excluded:
      - "Tests"
      - "App/Shared/Localization/TextLocalizedKey.swift"
  do_catch_same_line:
    name: "do block followed by catch on its own line"
    regex: '\}\s*\n\s*catch\s'
    message: "swift-format expects `} catch` on the same line. Round 22 caught two of these as `statement_position` errors; this guard fires earlier."
    severity: warning
    excluded:
      - "Tests"

reporter: "xcode"
