name: PersonalHygiene
options:
  bundleIdPrefix: com.tandori46001
  developmentLanguage: en
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Round 29: CI has been red on >30 consecutive commits because Swift 6
    # language mode at default strict-concurrency level surfaces errors in
    # pre-Swift-6 Apple SDK call sites (UNUserNotificationCenter, MapKit,
    # HealthKit, Contacts, CoreLocation, WeatherKit, MainActor-isolated
    # SwiftUI bodies touching @MainActor viewModels, etc.). Local
    # Xcode 26.4.1 emits warnings for the same code, masking the gap.
    # Dial strict-concurrency back to `minimal` so CI matches local. A full
    # `complete` migration is a future dedicated round (~30+ files).
    SWIFT_STRICT_CONCURRENCY: minimal
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:

  PersonalHygiene:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: PersonalHygiene
      - path: Shared
    dependencies:
      - target: PersonalHygieneWidgets
        embed: true
    preBuildScripts:
      - name: Stamp commit SHA
        # Writes the short git SHA into Resources/CommitSHA.txt so plain ▶ in
        # Xcode reflects the same build-identity that ./scripts/deploy-iphone.sh
        # already stamps via the CLI flow. basedOnDependencyAnalysis:false makes
        # the script run on every build (otherwise Xcode caches based on input
        # hash and skips it). Falls back to "dev" when run outside a git
        # checkout (e.g. archive in CI without fetch-depth).
        script: |
          set -eu
          SHA="$(cd "$SRCROOT/.." && git rev-parse --short HEAD 2>/dev/null || echo dev)"
          echo "$SHA" > "$SRCROOT/PersonalHygiene/Resources/CommitSHA.txt"
        outputFiles:
          - $(SRCROOT)/PersonalHygiene/Resources/CommitSHA.txt
        basedOnDependencyAnalysis: false
    info:
      path: PersonalHygiene/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: personal-hygiene
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSContactsUsageDescription: "personal-hygiene reads birthdays and anniversaries from your contacts to add reminders to your routine. Read-only access."
        NSHealthShareUsageDescription: "personal-hygiene reads medication doses and sleep data from Health to schedule reminders and validate your routine."
        NSHealthUpdateUsageDescription: "personal-hygiene logs medication doses to Health when you confirm taking them."
        NSCalendarsUsageDescription: "personal-hygiene reads your medical and social appointments from Calendar to integrate them into your routine."
        NSCameraUsageDescription: "personal-hygiene needs the camera to scan trip documents (passport, tickets, reservations). Scans are stored encrypted on this device only."
        NSLocationWhenInUseUsageDescription: "personal-hygiene reads your current location once to auto-fill your home address for travel-time padding on notifications. You can disable this and set the address manually."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tandori46001.personalhygiene
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_TEAM: "XC79TD476V"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PersonalHygieneWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: PersonalHygieneWidgets
      - path: Shared
    info:
      path: PersonalHygieneWidgets/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: personal-hygiene Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tandori46001.personalhygiene.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: "XC79TD476V"
        CODE_SIGN_STYLE: Automatic
        # Widget extension uses synchronous WidgetKit callbacks that need to
        # touch @MainActor SwiftData APIs. Swift 6 strict mode rejects this
        # without async boundaries; downgrading to Swift 5 language mode lets
        # the extension match the watch-widget target's pragmatics.
        SWIFT_VERSION: "5"

  PersonalHygieneWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: PersonalHygieneWatch
      - path: Shared
    dependencies:
      - target: PersonalHygieneWatchWidgets
        embed: true
    info:
      path: PersonalHygieneWatch/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: personal-hygiene
        WKApplication: true
        # Standalone watch app — installs directly to the Watch via
        # `xcrun devicectl`, doesn't depend on the iPhone host. We don't use
        # WatchConnectivity for cross-device data flow (each app reads its own
        # SwiftData store), so standalone is the simpler model.
        WKWatchOnly: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tandori46001.personalhygiene.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: "XC79TD476V"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  PersonalHygieneWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: PersonalHygieneWatchWidgets
      - path: Shared
    info:
      path: PersonalHygieneWatchWidgets/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: personal-hygiene Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tandori46001.personalhygiene.watchkitapp.widgets
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: "XC79TD476V"
        CODE_SIGN_STYLE: Automatic
        # Watch widget extension uses synchronous WidgetKit callbacks that need
        # to touch @MainActor SwiftData APIs (mirrors the iOS PersonalHygieneWidgets
        # downgrade). Swift 6 strict mode rejects passing the non-Sendable
        # completion handler across actor boundaries without it.
        SWIFT_VERSION: "5"

  PersonalHygieneTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ../Tests/Unit
    dependencies:
      - target: PersonalHygiene
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tandori46001.personalhygiene.tests

  PersonalHygieneUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ../Tests/UI
    dependencies:
      - target: PersonalHygiene
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tandori46001.personalhygiene.uitests
        TEST_TARGET_NAME: PersonalHygiene

schemes:
  PersonalHygiene:
    build:
      targets:
        PersonalHygiene: all
        PersonalHygieneTests: [test]
        PersonalHygieneUITests: [test]
    test:
      targets:
        - PersonalHygieneTests
        - PersonalHygieneUITests
      gatherCoverageData: true
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release

  PersonalHygieneWatch:
    build:
      targets:
        PersonalHygieneWatch: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
